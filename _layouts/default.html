<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: #2c3e50;
            background-color: #f8f9fa;
        }

        /* Header & Navigation */
        header {
            background: linear-gradient(135deg, #1e3a5f 0%, #2c5282 100%);
            color: white;
            padding: 1rem 0;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            text-decoration: none;
            color: white;
            letter-spacing: 0.5px;
        }

        nav {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
        }

        nav a {
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: color 0.3s, border-bottom 0.3s;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid transparent;
        }

        nav a:hover,
        nav a.active {
            color: white;
            border-bottom-color: #00d4ff;
        }

        /* Main Content */
        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 3rem 2rem;
            min-height: calc(100vh - 200px);
        }

        /* Typography */
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: #1e3a5f;
        }

        h2 {
            font-size: 2rem;
            font-weight: 700;
            margin-top: 2.5rem;
            margin-bottom: 1.5rem;
            color: #1e3a5f;
            border-bottom: 3px solid #00d4ff;
            padding-bottom: 0.75rem;
        }

        h3 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-top: 1.5rem;
            margin-bottom: 1rem;
            color: #2c5282;
        }

        p {
            margin-bottom: 1.5rem;
            line-height: 1.8;
            font-size: 1rem;
        }

        ul, ol {
            margin-left: 2rem;
            margin-bottom: 1.5rem;
        }

        li {
            margin-bottom: 0.75rem;
            line-height: 1.7;
        }

        /* Links */
        a {
            color: #00d4ff;
            text-decoration: none;
            transition: color 0.3s;
        }

        a:hover {
            color: #0099cc;
            text-decoration: underline;
        }

        main a {
            color: #0099cc;
        }

        /* Cards & Buttons */
        .card {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
        }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin: 3rem 0;
        }

        .card-button {
            display: block;
            text-decoration: none;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 3rem 2rem;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .card-button:hover {
            border-color: #00d4ff;
            box-shadow: 0 12px 32px rgba(0, 212, 255, 0.15);
            transform: translateY(-8px);
        }

        .card-button h3 {
            font-size: 1.8rem;
            margin: 0 0 1rem 0;
            color: #1e3a5f;
        }

        .card-button p {
            margin: 0;
            color: #666;
            font-size: 0.95rem;
        }

        .card-button .icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        /* Skills Section */
        .skills {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin: 2rem 0;
        }

        .skill-box {
            background: white;
            padding: 1.5rem;
            border-radius: 8px;
            border-left: 4px solid #00d4ff;
        }

        .skill-box h4 {
            color: #1e3a5f;
            margin-bottom: 0.75rem;
            font-weight: 600;
        }

        .skill-box ul {
            margin: 0;
            padding-left: 1.5rem;
        }

        .skill-box li {
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        /* Footer */
        footer {
            background: #1e3a5f;
            color: white;
            text-align: center;
            padding: 2rem;
            margin-top: 4rem;
        }

        footer p {
            margin: 0;
            color: rgba(255, 255, 255, 0.8);
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin: 1rem 0;
        }

        .social-links a {
            color: white;
            font-size: 1.1rem;
            transition: color 0.3s;
        }

        .social-links a:hover {
            color: #00d4ff;
        }

        /* Home Page Special */
        .intro-section {
            text-align: center;
            margin-bottom: 4rem;
        }

        .intro-section h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .intro-section .subtitle {
            font-size: 1.3rem;
            color: #00d4ff;
            font-weight: 500;
            margin-bottom: 2rem;
        }

        .intro-section p {
            font-size: 1.1rem;
            max-width: 700px;
            margin: 0 auto 2rem;
            color: #555;
            line-height: 1.8;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-container {
                flex-direction: column;
                gap: 1rem;
            }

            nav {
                gap: 1rem;
                flex-direction: column;
                width: 100%;
            }

            nav a {
                padding: 0.75rem 0;
            }

            h1 {
                font-size: 2rem;
            }

            .intro-section h1 {
                font-size: 2rem;
            }

            .intro-section .subtitle {
                font-size: 1.1rem;
            }

            main {
                padding: 2rem 1rem;
            }

            .button-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Accessibility */
        a:focus,
        button:focus {
            outline: 2px solid #00d4ff;
            outline-offset: 2px;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-container">
            <a href="/" class="logo">Patrik Lauzirika Uriarte</a>
            <nav>
                <a href="/" {% if page.url == '/' %}class="active"{% endif %}>Home</a>
                <a href="/about/" {% if page.url == '/about/' %}class="active"{% endif %}>About</a>
                <a href="/projects/" {% if page.url == '/projects/' %}class="active"{% endif %}>Projects</a>
                <a href="/contact/" {% if page.url == '/contact/' %}class="active"{% endif %}>Contact</a>
                <a href="https://github.com/patriklauzirika" target="_blank">GitHub</a>
            </nav>
        </div>
    </header>

    <main>
        {{ content }}
    </main>

    <footer>
        <div class="social-links">
            <a href="https://github.com/patriklauzirika" target="_blank" title="GitHub">GitHub</a>
            <a href="https://www.linkedin.com/in/patrik-lauzirika-uriarte-7655b71a5/" target="_blank" title="LinkedIn">LinkedIn</a>
            <a href="mailto:patriklauzirika@gmail.com" title="Email">Email</a>
        </div>
        <p>&copy; 2026 Patrik Lauzirika Uriarte. Finance & Business Intelligence Professional.</p>
    </footer>
</body>
</html>
